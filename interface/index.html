<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geek File Manager</title>
  <link rel="stylesheet" href="/index.css">
  <link rel="stylesheet" href="/theme.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="left-part">
        <span class="title" onclick="Dialog.show('info')">Geek File Manager [<span class="puteros-version">beta</span>]</span>
      </div>
      <div class="right-part">
        <button id="act-btn-logout" class="btn-action">Logout</button>
      </div>
    </div>
    <div class="free-space">
      <span class="btn-action act-browse block-space free-sd active" data-path="/">
        Storage [<span>0 MB</span>]
      </span>
    </div>
    <div class="action-content">
      <span class="breadcrumb">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24">
          <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
        </svg>
        <span class="current-path">Storage://</span>
      </span>
      <div class="body-actions">
        <button class="icon-action" title="Upload files to current folder">
          <input type='file' class="inp-uploader" multiple autocomplete="off">
          <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24">
            <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5z"/>
          </svg>
        </button>
        <button class="icon-action" title="Upload folder to current folder">
          <input type='file' class="inp-uploader" webkitdirectory directory multiple autocomplete="off">
          <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24">
            <path d="M20 6h-8l-2-2H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
            <path d="M12 9l-4 5h2.5v3h3v-3H16z"/>
          </svg>
        </button>
        <button class="icon-action act-oinput" data-action="createFile" title="Create new file">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/>
          </svg>
        </button>
        <button class="icon-action act-oinput" data-action="createFolder" title="Create new folder">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
            <path d="M20 6h-8l-2-2H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-1 8h-3v3h-2v-3h-3v-2h3v-3h2v3h3v2z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="content">
      <table class="table explorer">
        <thead>
          <tr>
            <th class="col-name">Name</th>
            <th class="col-size">Size</th>
            <th class="col-action">Action</th>
          </tr>
        </thead>
        <tbody>

        </tbody>
      </table>
    </div>
  </div>
  <template id="t">
    <table>
      <tr class="path-row">
        <td colspan="3">..</td>
      </tr>
      <tr class="file-row">
        <td class="col-name"></td>
        <td class="col-size"></td>
        <td class="col-action">
          <button class="icon-action act-play" title="Run this file">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <a class="icon-action act-download" title="Download">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v13m-5-5 5 5 5-5M5 19h14"/>
            </svg>
          </a>
          <button class="icon-action act-crack" title="Crack WPA2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
            </svg>
          </button>
          <button class="icon-action act-oinput act-rename" data-action="" title="Rename">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
          <button class="icon-action act-delete" title="Delete">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
          </button>
        </td>
      </tr>
    </table>
    <div class="upload-loading">
      <span class="upload-name"></span>
      <div class="bar"></div>
    </div>
  </template>
  <div class="dialog-background hidden">
    <div class="dialog upload hidden">
      <div class="dialog-head">Uploading</div>
      <div class="dialog-body"></div>
    </div>
    <div class="dialog info hidden">
      <div class="dialog-head">Info</div>
      <div class="dialog-body">
        <p>You can also help develop the File Manager using <a href="https://github.com/lshaf/puteros-file-manager"
            target="_blank">Geek File Manager</a> by <a href="https://github.com/lshaf" target="_blank">lshaf</a>.
        </p>
      </div>
      <div class="dialog-footer">
        <button class="btn-action act-dialog-close act-escape">Close</button>
      </div>
    </div>
    <div class="dialog oinput hidden">
      <div class="dialog-head">
        <span class="oinput-title">Rename</span>
        <span class="oinput-file-name"></span>
      </div>
      <div class="dialog-body">
        <label for="oinput-input" class="oinput-label">New name:</label>
        <input type="text" id="oinput-input" autocomplete="off">
      </div>
      <div class="dialog-footer">
        <button class="btn-action act-save-oinput-file">Save</button>
        <button class="btn-action act-dialog-close act-escape">Close</button>
      </div>
    </div>
    <div class="dialog auth hidden">
      <div class="dialog-head">
        <span class="oinput-title">Authentication</span>
      </div>
      <div class="dialog-body">
        <label for="oinput-input" class="oinput-label">Password:</label>
        <input type="text" id="auth-password" autocomplete="off">
      </div>
      <div class="dialog-footer">
        <button class="btn-action act-auth-login">Login</button>
      </div>
    </div>
    <div class="dialog crack hidden">
      <div class="dialog-head">Crack: <span class="crack-file-name"></span></div>
      <div class="dialog-body">
        <div class="crack-phase-dict">
          <div class="crack-dict-label">Select dictionary:</div>
          <select class="crack-dict-select"></select>
        </div>
        <div class="crack-phase-run hidden">
          <div class="crack-bar-wrap">
            <div class="crack-bar"></div>
            <span class="crack-bar-pct">0%</span>
          </div>
          <div class="crack-stats"></div>
        </div>
        <div class="crack-result hidden"></div>
        <div class="crack-mode hidden"></div>
      </div>
      <div class="dialog-footer">
        <button class="btn-action act-crack-go" disabled>Crack</button>
        <button class="btn-action act-crack-stop hidden">Stop</button>
        <button class="btn-action act-crack-retry-save hidden">Retry Save</button>
        <button class="btn-action act-dialog-close act-escape">Close</button>
      </div>
    </div>
    <div class="dialog editor hidden">
      <div class="dialog-head">
        Edit: <span class="editor-file-name"></span>
      </div>
      <textarea class="dialog-body file-content" style="resize: none;"></textarea>
      <div class="dialog-footer">
        <button class="btn-action act-save-edit-file" title="CTRL + S">Save</button>
        <button class="btn-action act-dialog-close act-escape">Close</button>
      </div>
    </div>
  </div>
  <div class="loading-area hidden">
    <div class="text"></div>
  </div>
  <div class="upload-area hidden"></div>
  <script src="/index.js"></script>
</body>
</html>
